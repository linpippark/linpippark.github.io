<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>澳門自由行旅遊地圖</title>
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#CFAB8D">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="2026澳門自由行">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ECEEDF',
                        secondary: '#BBDCE5',
                        tertiary: '#D9C4B0',
                        dark: '#CFAB8D'
                    },
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        body {
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            background-color: #f8fafc;
        }

        #map {
            height: calc(100dvh - 145px); /* 扣掉頂部天氣區域與 padding */
            width: 100%;
            z-index: 10;
        }

        #bottom-sheet {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(120%);
            z-index: 50;
        }

        #bottom-sheet.show {
            transform: translateY(0);
        }

        .custom-marker {
            background-color: theme('colors.dark');
            color: #1e293b;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 2px solid white;
            transition: transform 0.2s;
            width: 32px;
            height: 32px;
        }
        
        .custom-marker.new-place {
            background-color: theme('colors.secondary');
            color: #1e293b; 
        }

        .custom-marker.special-hotel {
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
            animation: none !important;
            display: block;
        }

        .leaflet-marker-icon.active-marker {
            background-color: #E63946 !important;
            color: white !important;
            border-color: white !important;
            z-index: 1000 !important;
            box-shadow: 0 0 0 6px rgba(230, 57, 70, 0.3), 0 4px 6px rgba(0,0,0,0.3) !important;
        }

        .hotel-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            animation: bounce-wrapper 0.8s infinite alternate cubic-bezier(0.5, 0.05, 1, 0.5);
        }
        
        @keyframes bounce-wrapper {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }

        .hotel-pin {
            background-color: #E63946; /* 醒目的艷紅色 */
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid white;
            box-shadow: -2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 2px;
        }

        .hotel-pin i {
            transform: rotate(45deg);
            font-size: 16px;
        }

        .hotel-shadow {
            width: 16px;
            height: 4px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            position: absolute;
            bottom: -8px;
            animation: shadow-scale 0.8s infinite alternate cubic-bezier(0.5, 0.05, 1, 0.5);
        }

        @keyframes shadow-scale {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.3); opacity: 0.1; }
        }

        .leaflet-popup-content-wrapper {
            border-radius: 1rem;
            background-color: theme('colors.primary');
            color: #1e293b;
            font-weight: bold;
        }

        .weather-scroll::-webkit-scrollbar {
            display: none; 
        }
    </style>
</head>
<body class="flex flex-col relative text-slate-800 h-[100dvh] w-full overflow-hidden">

    <!-- 頂部：日期與當前天氣 -->
    <header class="bg-dark text-slate-800 py-2 px-4 shadow-lg z-20 flex-shrink-0 select-none" id="header">
        <div class="flex justify-between items-center mb-1">
            <div>
                <h1 class="text-lg font-bold flex items-center">
                    <i class="fa-solid fa-map-location-dot mr-2"></i>澳門自由行 
                </h1>
                <p class="text-xs mt-0.5 flex items-center">
                    <span id="current-date">載入日期中...</span>
                </p>
            </div>
            <div class="text-right flex items-center gap-2">
                <i id="current-weather-icon" class="fa-solid fa-cloud-sun text-2xl"></i>
                <div>
                    <div class="text-xl font-bold leading-tight" id="current-temp">--°C</div>
                    <div class="text-[10px] leading-none" id="current-desc">載入天氣中...</div>
                </div>
            </div>
        </div>

        <!-- 一週天氣預報 (水平捲動) -->
        <div class="weather-scroll flex gap-3 overflow-x-auto pb-1 pt-1 border-t border-black/10" id="forecast-container">
            <div class="text-sm text-slate-600 text-center w-full">預報資料載入中...</div>
        </div>
    </header>

    <!-- 地圖區塊 -->
    <main class="flex-grow relative">
        <div id="map"></div>
        
        <!-- 左側面板開關 (當面板收合時顯示) -->
        <button id="btn-open-sidebar" class="hidden absolute top-4 left-4 bg-white/80 backdrop-blur shadow-lg p-3 rounded-xl z-20 text-slate-700 active:scale-95 transition-transform border border-slate-200">
            <i class="fa-solid fa-list-ul"></i>
        </button>

        <!-- 左側半透明景點列表 -->
        <div id="places-sidebar" class="absolute top-4 left-4 bottom-36 w-[180px] max-w-[45vw] bg-white/70 backdrop-blur-md rounded-2xl shadow-lg z-20 overflow-hidden flex flex-col border border-white/50 transition-transform duration-300 transform translate-x-0">
            <h3 class="text-xs text-slate-800 font-bold bg-white/50 px-4 py-3 border-b border-slate-300/50 flex-shrink-0 flex justify-between items-center">
                <span><i class="fa-solid fa-list-ul mr-2"></i>所有景點</span>
                <button id="btn-close-sidebar" class="text-slate-500 hover:text-slate-800 active:scale-90 transition-transform p-1"><i class="fa-solid fa-chevron-left"></i></button>
            </h3>
            <div class="px-2 pt-2 flex-shrink-0">
                <input type="text" id="filter-input" placeholder="尋找列表景點..." class="w-full px-2 py-1.5 text-xs rounded-lg border border-slate-300 focus:outline-none focus:border-tertiary bg-white/80 placeholder-slate-400">
            </div>
            <ul id="places-list" class="flex-1 overflow-y-auto p-3 space-y-3 text-sm scroll-smooth">
                <li class="text-slate-500 text-xs">載入中...</li>
            </ul>
        </div>
        
        <!-- 搜尋按鈕 (預設顯示) -->
        <button id="btn-search" class="absolute bottom-32 right-4 bg-primary p-3 rounded-full shadow-lg z-20 text-slate-800 border-2 border-dark active:scale-95 transition-transform">
            <i class="fa-solid fa-magnifying-glass text-xl"></i>
        </button>

        <!-- 返回目前位置按鈕 (可選) -->
        <button id="btn-center" class="absolute bottom-16 right-4 bg-white p-3 rounded-full shadow-lg z-20 text-dark border-2 border-primary active:scale-95 transition-transform">
            <i class="fa-solid fa-crosshairs text-xl"></i>
        </button>
    </main>

    <!-- 底部資訊卡片 -->
    <div id="bottom-sheet" class="absolute bottom-0 left-0 w-full bg-white rounded-t-3xl shadow-[0_-5px_15px_rgba(0,0,0,0.1)] p-6">
        <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-4"></div>
        
        <div class="flex justify-between items-start mb-4">
            <h2 id="place-title" class="text-2xl font-bold text-slate-800 w-5/6 leading-tight">選擇景點</h2>
            <button id="btn-close" class="text-gray-400 hover:text-gray-600 w-1/6 text-right text-2xl">
                <i class="fa-solid fa-times-circle"></i>
            </button>
        </div>
        
        <div class="flex items-center text-sm text-gray-500 mb-6">
            <i class="fa-solid fa-location-dot mr-2 text-tertiary"></i>
            <span id="place-coords">請點擊地圖上的座標</span>
        </div>
        
        <div id="bottom-sheet-actions" class="flex gap-4">
            <button id="btn-nav" class="flex-1 bg-tertiary text-slate-800 py-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center">
                <i class="fa-solid fa-location-arrow mr-2"></i>前往導航
            </button>
            <button id="btn-delete" class="hidden flex-1 bg-red-600 text-white py-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center">
                <i class="fa-solid fa-trash-can mr-2"></i>刪除
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Firebase SDK (Compat version for file:// protocol) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    
    <!-- 主程式 -->
    <script src="app.js"></script>

    <!-- 註冊 Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }).catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
