<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🇲🇴 澳門自由行互動地圖</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS & JS for Interactive Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent pull-to-refresh on mobile */
        }

        /* Mobile Simulation Wrapper */
        .app-container {
            position: relative;
            width: 100%;
            height: 100vh;
            height: 100dvh; /* Dynamic viewport height for iOS */
            max-width: 430px; /* iPhone Pro Max width limit for desktop viewing */
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Map Section */
        #map {
            flex: 1;
            width: 100%;
            z-index: 1;
            background-color: #aadaff; /* Light water color fallback */
        }

        /* Bottom Sheet Section */
        .bottom-sheet {
            height: 45%;
            background: #ffffff;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
            z-index: 10;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: height 0.3s ease;
        }

        /* Custom Leaflet Marker Styles */
        .custom-marker {
            background: none;
            border: none;
        }
        .marker-icon-wrapper {
            background: white;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            border: 2px solid #0055A4; /* Portuguese Blue */
            position: relative;
            transition: transform 0.2s;
        }
        .marker-icon-wrapper:hover {
            transform: scale(1.1);
        }
        .marker-label {
            position: absolute;
            bottom: -20px;
            white-space: nowrap;
            font-size: 10px;
            font-weight: 700;
            background: rgba(255,255,255,0.9);
            padding: 2px 6px;
            border-radius: 4px;
            color: #333;
            text-shadow: 0 1px 2px white;
        }
        .hotel-marker { border-color: #E63946; background: #FFF0F0; }

        /* Animated Route Path */
        .animated-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 3s linear forwards;
        }
        @keyframes dash {
            to { stroke-dashoffset: 0; }
        }

        /* Pulse Animation for Play Button */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0, 85, 164, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 85, 164, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0, 85, 164, 0); }
        }
        .btn-play {
            animation: pulse-ring 2s infinite;
        }

        /* Portuguese Tile Pattern Header */
        .azulejo-bg {
            background-image: radial-gradient(#0055A4 1px, transparent 1px);
            background-size: 10px 10px;
            background-color: #f0f7ff;
        }

        /* Scrollbar hiding */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- Top Header -->
    <div class="absolute top-0 left-0 w-full z-20 pointer-events-none p-4 pt-10">
        <div class="bg-white/90 backdrop-blur-sm rounded-xl p-3 shadow-lg pointer-events-auto border-l-4 border-blue-600 flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold text-gray-800 tracking-wide"><i class="fa-solid fa-map-location-dot text-blue-600 mr-2"></i>澳門自由行指南</h1>
                <p class="text-xs text-gray-500 mt-1">🏠 住宿：藝舍酒店 (Hotel S)</p>
            </div>
            <div id="weather-widget" class="text-2xl">🌤️</div>
        </div>
    </div>

    <!-- The Map -->
    <div id="map"></div>

    <!-- Dynamic Bottom Sheet -->
    <div class="bottom-sheet flex flex-col">
        <!-- Drag Handle -->
        <div class="w-full flex justify-center pt-3 pb-1" onclick="toggleSheet()">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
        </div>

        <!-- Day Tabs -->
        <div class="flex px-4 pt-2 gap-2 overflow-x-auto pb-2 shrink-0">
            <button onclick="selectDay(0)" class="day-tab flex-1 bg-blue-600 text-white rounded-lg py-2 text-sm font-bold shadow-md transition-all">第一天</button>
            <button onclick="selectDay(1)" class="day-tab flex-1 bg-gray-100 text-gray-600 rounded-lg py-2 text-sm font-bold shadow-sm transition-all">第二天</button>
            <button onclick="selectDay(2)" class="day-tab flex-1 bg-gray-100 text-gray-600 rounded-lg py-2 text-sm font-bold shadow-sm transition-all">第三天</button>
        </div>

        <!-- Action Bar -->
        <div class="px-4 py-2 flex justify-between items-center border-b border-gray-100 shrink-0 azulejo-bg">
            <h2 id="day-title" class="font-bold text-blue-800 text-md">歷史城區巡禮</h2>
            <button id="play-btn" onclick="playRoute()" class="btn-play bg-blue-600 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-lg flex items-center gap-2">
                <i class="fa-solid fa-play"></i> 播放路線
            </button>
        </div>

        <!-- Itinerary List -->
        <div id="itinerary-list" class="flex-1 overflow-y-auto p-4 space-y-4">
            <!-- Populated by JS -->
        </div>
    </div>

</div>

<script>
    // --- 1. Data Definitions ---
    
    // Core Locations mapped with coordinates
    const locations = {
        hotel: { name: "藝舍酒店 (Hotel S)", lat: 22.1915, lng: 113.5365, icon: "🏨", type: "hotel" },
        senado: { name: "議事亭前地", lat: 22.1936, lng: 113.5398, icon: "🏛️", type: "attraction" },
        stpaul: { name: "大三巴牌坊", lat: 22.1976, lng: 113.5408, icon: "⛪", type: "attraction" },
        fortress: { name: "大砲台", lat: 22.1970, lng: 113.5422, icon: "🏰", type: "attraction" },
        margaret: { name: "瑪嘉烈蛋撻", lat: 22.1920, lng: 113.5424, icon: "🥧", type: "food" },
        
        cunha: { name: "官也街 (氹仔)", lat: 22.1537, lng: 113.5568, icon: "🛍️", type: "food" },
        venetian: { name: "威尼斯人", lat: 22.1485, lng: 113.5615, icon: "🛶", type: "attraction" },
        londoner: { name: "倫敦人", lat: 22.1450, lng: 113.5640, icon: "🇬🇧", type: "attraction" },
        parisian: { name: "巴黎人", lat: 22.1432, lng: 113.5607, icon: "🗼", type: "attraction" },
        
        ama: { name: "媽閣廟", lat: 22.1863, lng: 113.5312, icon: "🏮", type: "attraction" },
        tower: { name: "澳門旅遊塔", lat: 22.1794, lng: 113.5372, icon: "🗼", type: "attraction" },
        mj: { name: "十六浦 MJ 咖啡", lat: 22.1963, lng: 113.5362, icon: "☕", type: "food" }
    };

    // The Itinerary structure
    const itineraries = [
        {
            title: "經典歷史城區步行遊",
            theme: "走路就能到的澳門精華，品嚐在地小吃！",
            steps: [
                { loc: "hotel", desc: "早上從飯店出發", time: "09:30" },
                { loc: "senado", desc: "漫步波浪地磚，感受葡式風情", time: "10:00", transport: "walk", min: "10分" },
                { loc: "stpaul", desc: "必拍地標！大三巴牌坊", time: "11:00", transport: "walk", min: "8分" },
                { loc: "fortress", desc: "俯瞰澳門半島全景", time: "12:00", transport: "walk", min: "5分" },
                { loc: "margaret", desc: "午餐：美味葡式蛋撻", time: "13:30", transport: "walk", min: "15分" },
                { loc: "hotel", desc: "回飯店稍作休息", time: "15:00", transport: "walk", min: "10分" }
            ],
            color: "#10B981" // Green for walking
        },
        {
            title: "路氹城奢華打卡之旅",
            theme: "搭乘公車前往路氹，體驗浮誇酒店！",
            steps: [
                { loc: "hotel", desc: "飯店出發前往巴士站", time: "10:00" },
                { loc: "venetian", desc: "室內運河與貢多拉船", time: "11:00", transport: "bus", min: "MT4公車 (30分)" },
                { loc: "londoner", desc: "大笨鐘與英倫風情打卡", time: "14:00", transport: "walk", min: "10分" },
                { loc: "parisian", desc: "巴黎鐵塔夜景超美", time: "17:00", transport: "walk", min: "8分" },
                { loc: "cunha", desc: "晚餐：官也街吃水蟹粥", time: "19:00", transport: "bus", min: "搭乘輕軌或公車" }
            ],
            color: "#3B82F6" // Blue for bus
        },
        {
            title: "文化與高空視野",
            theme: "海邊漫步與塔上風光，完美收尾！",
            steps: [
                { loc: "hotel", desc: "整理行李，飯店寄放", time: "09:30" },
                { loc: "ama", desc: "參拜澳門最古老廟宇", time: "10:00", transport: "walk", min: "15分" },
                { loc: "tower", desc: "挑戰空中漫步，看無敵海景", time: "11:30", transport: "bus", min: "10分" },
                { loc: "mj", desc: "下午茶：十六浦 MJ 咖啡", time: "14:30", transport: "bus", min: "15分" },
                { loc: "hotel", desc: "拿行李，準備前往機場/碼頭", time: "16:00", transport: "walk", min: "5分" }
            ],
            color: "#8B5CF6" // Purple for mixed
        }
    ];

    let currentDay = 0;
    let map;
    let markers = [];
    let routePolyline = null;
    let animatedMarker = null;
    let isAnimating = false;

    // --- 2. Initialization ---
    window.onload = function() {
        initMap();
        renderUI();
    };

    function initMap() {
        // Init map centered on Hotel S
        map = L.map('map', {
            zoomControl: false, // Hide default zoom for cleaner mobile UI
            attributionControl: false // Hide to save space
        }).setView([locations.hotel.lat, locations.hotel.lng], 15);

        // Add minimalist tile layer (CartoDB Positron for clean look)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // Add custom attribution bottom right
        L.control.attribution({position: 'topright'}).addAttribution('&copy; OpenStreetMap').addTo(map);
    }

    function createIcon(locData) {
        let extraClass = locData.type === 'hotel' ? 'hotel-marker' : '';
        return L.divIcon({
            className: 'custom-marker',
            html: `<div class="marker-icon-wrapper ${extraClass}">
                     ${locData.icon}
                     <div class="marker-label">${locData.name}</div>
                   </div>`,
            iconSize: [36, 36],
            iconAnchor: [18, 18]
        });
    }

    function renderUI() {
        const dayData = itineraries[currentDay];
        
        // Update Title
        document.getElementById('day-title').innerText = dayData.title;

        // Update Tabs styling
        const tabs = document.querySelectorAll('.day-tab');
        tabs.forEach((tab, index) => {
            if(index === currentDay) {
                tab.className = 'day-tab flex-1 bg-blue-600 text-white rounded-lg py-2 text-sm font-bold shadow-md transition-all scale-105';
            } else {
                tab.className = 'day-tab flex-1 bg-gray-100 text-gray-500 rounded-lg py-2 text-sm font-medium shadow-sm transition-all opacity-80';
            }
        });

        // Update Itinerary List
        const listDiv = document.getElementById('itinerary-list');
        listDiv.innerHTML = `<p class="text-xs text-gray-500 mb-2 mt-[-5px]">💡 ${dayData.theme}</p>`;
        
        dayData.steps.forEach((step, index) => {
            const loc = locations[step.loc];
            const isLast = index === dayData.steps.length - 1;
            
            let transportHtml = '';
            if (!isLast && dayData.steps[index+1].transport) {
                const transType = dayData.steps[index+1].transport;
                const transIcon = transType === 'walk' ? '🚶' : '🚌';
                const transColor = transType === 'walk' ? 'text-green-500' : 'text-blue-500';
                transportHtml = `
                    <div class="pl-4 py-1 flex items-center gap-2 border-l-2 border-dashed border-gray-300 ml-[11px] my-1">
                        <span class="${transColor} text-xs font-bold bg-${transType==='walk'?'green':'blue'}-50 px-2 py-0.5 rounded-full border border-${transType==='walk'?'green':'blue'}-100">
                            ${transIcon} ${dayData.steps[index+1].min}
                        </span>
                    </div>
                `;
            }

            listDiv.innerHTML += `
                <div class="flex items-start gap-3 cursor-pointer hover:bg-gray-50 p-1 rounded transition" onclick="focusLocation('${step.loc}')">
                    <div class="flex flex-col items-center">
                        <div class="w-6 h-6 rounded-full bg-blue-100 border-2 border-blue-600 flex items-center justify-center text-xs font-bold text-blue-700 z-10">
                            ${index + 1}
                        </div>
                        ${!isLast ? '<div class="w-0.5 h-full bg-gray-200 -my-1"></div>' : ''}
                    </div>
                    <div class="flex-1 pb-2">
                        <div class="flex justify-between items-baseline">
                            <h3 class="font-bold text-gray-800 text-sm">${loc.name} ${loc.icon}</h3>
                            <span class="text-xs font-bold text-gray-400">${step.time}</span>
                        </div>
                        <p class="text-xs text-gray-600 mt-0.5">${step.desc}</p>
                    </div>
                </div>
                ${transportHtml}
            `;
        });

        // Update Map Markers
        updateMapMarkers();
    }

    function selectDay(dayIndex) {
        if(isAnimating) return; // Prevent clicking during animation
        currentDay = dayIndex;
        renderUI();
    }

    function focusLocation(locKey) {
        const loc = locations[locKey];
        map.flyTo([loc.lat, loc.lng], 16, { duration: 1.5 });
    }

    function updateMapMarkers() {
        // Clear old markers
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        if(routePolyline) map.removeLayer(routePolyline);
        if(animatedMarker) map.removeLayer(animatedMarker);
        
        const dayData = itineraries[currentDay];
        const bounds = L.latLngBounds();

        // Add markers for current day
        dayData.steps.forEach(step => {
            const loc = locations[step.loc];
            const marker = L.marker([loc.lat, loc.lng], { icon: createIcon(loc) }).addTo(map);
            
            // Add popup
            marker.bindPopup(`<b>${loc.name}</b><br><span style="font-size:12px">${step.time} - ${step.desc}</span>`);
            
            markers.push(marker);
            bounds.extend([loc.lat, loc.lng]);
        });

        // Fit map to show all points
        map.fitBounds(bounds, { padding: [40, 40], maxZoom: 16 });
    }

    // Advanced Route Animation Logic
    function playRoute() {
        if (isAnimating) return;
        isAnimating = true;

        const btn = document.getElementById('play-btn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 導航中...';
        btn.classList.replace('bg-blue-600', 'bg-orange-500');

        // Clear existing route
        if(routePolyline) map.removeLayer(routePolyline);
        if(animatedMarker) map.removeLayer(animatedMarker);

        const dayData = itineraries[currentDay];
        let latlngs = dayData.steps.map(s => [locations[s.loc].lat, locations[s.loc].lng]);

        // Draw static faint background path
        L.polyline(latlngs, {color: '#CBD5E1', weight: 4, dashArray: '5, 10'}).addTo(map);

        // Setup the animated line array
        let animatedLine = L.polyline([], {
            color: dayData.color,
            weight: 5,
            opacity: 0.8
        }).addTo(map);

        routePolyline = animatedLine;

        // Animated Moving Element (Emoji)
        let customEmojiIcon = L.divIcon({
            className: 'custom-marker',
            html: `<div style="font-size: 24px; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.5)); transform: translateY(-10px);">📍</div>`,
            iconSize: [24, 24]
        });
        animatedMarker = L.marker(latlngs[0], {icon: customEmojiIcon, zIndexOffset: 1000}).addTo(map);

        // Interpolate points for smooth animation
        let allPoints = [];
        for (let i = 0; i < latlngs.length - 1; i++) {
            const start = latlngs[i];
            const end = latlngs[i+1];
            const steps = 30; // 30 frames between points
            
            for (let j = 0; j <= steps; j++) {
                const lat = start[0] + (end[0] - start[0]) * (j / steps);
                const lng = start[1] + (end[1] - start[1]) * (j / steps);
                // Also store which transport mode we are in for icon change
                const transType = dayData.steps[i+1].transport || 'walk';
                allPoints.push({latlng: [lat, lng], transType: transType});
            }
        }

        let currentFrame = 0;
        let speed = 25; // ms per frame

        function animateFrame() {
            if (currentFrame >= allPoints.length) {
                // Animation Finished
                isAnimating = false;
                btn.innerHTML = '<i class="fa-solid fa-play"></i> 重播路線';
                btn.classList.replace('bg-orange-500', 'bg-blue-600');
                return;
            }

            const pointData = allPoints[currentFrame];
            animatedLine.addLatLng(pointData.latlng);
            animatedMarker.setLatLng(pointData.latlng);

            // Change emoji based on transport
            let currentEmoji = pointData.transType === 'walk' ? '🚶' : '🚌';
            animatedMarker.setIcon(L.divIcon({
                className: 'custom-marker',
                html: `<div style="font-size: 28px; filter: drop-shadow(0px 3px 3px rgba(0,0,0,0.4));">${currentEmoji}</div>`,
                iconSize: [28, 28]
            }));

            // Auto-pan map slightly to follow marker if it gets too close to edge
            if(currentFrame % 10 === 0) {
               // Optional: map.panTo(pointData.latlng, {animate: true, duration: 0.2});
            }

            currentFrame++;
            setTimeout(animateFrame, speed);
        }

        // Start animation loop
        animateFrame();
    }

    // Toggle bottom sheet size
    let sheetExpanded = false;
    function toggleSheet() {
        const sheet = document.querySelector('.bottom-sheet');
        if(sheetExpanded) {
            sheet.style.height = '45%';
            sheetExpanded = false;
        } else {
            sheet.style.height = '75%';
            sheetExpanded = true;
        }
    }

</script>

</body>
</html>
